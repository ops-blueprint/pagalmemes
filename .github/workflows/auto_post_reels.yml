name: Auto-post reels to Facebook Page

# Same times as the image posts (auto_post.yml): 7am and 7pm IST.
#   7:00 AM IST -> 01:30 UTC
#   7:00 PM IST -> 13:30 UTC
on:
  schedule:
    - cron: "30 1 * * *"
    - cron: "30 13 * * *"
  workflow_dispatch: {}

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          pip install -r content_pipeline/requirements.txt
          pip install -r fb_auto_poster/requirements.txt

      - name: Generate and post a 5-meme compilation reel
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          PAGE_HANDLE: "@MemeVaultUSA"
        run: python3 auto_post_reel.py

      - name: Commit updated dedupe log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content_pipeline/used_memes.json
          git diff --cached --quiet && exit 0
          git commit -m "Update used_memes log (reel) [skip ci]"
          for i in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt $i) -- another scheduled job likely pushed first. Rebasing and retrying..."
            sleep $((RANDOM % 10 + 5))
            git pull --rebase origin main
          done
          echo "Failed to push after 5 attempts."
          exit 1
