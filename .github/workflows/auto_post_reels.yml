name: Auto-post reels to Facebook Page

# 1x/day for now (video generation/posting is heavier than the image posts,
# and it's worth watching engagement before scaling up cadence).
#   1:00 PM IST -> 07:30 UTC
on:
  schedule:
    - cron: "30 7 * * *"
  workflow_dispatch: {}

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          pip install -r content_pipeline/requirements.txt
          pip install -r fb_auto_poster/requirements.txt

      - name: Generate and post one reel
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          PAGE_HANDLE: "@MemeVaultUSA"
        run: python3 auto_post_reel.py

      - name: Commit updated dedupe log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content_pipeline/used_memes.json
          git diff --cached --quiet || git commit -m "Update used_memes log (reel) [skip ci]"
          git push
