name: Auto-post memes to Facebook Page

# Times below are set for IST (UTC+5:30). GitHub Actions cron is always UTC.
# Defaulting to 2x/day (matching the lesson learned on the facts page: consistency
# over volume for a new content direction) -- adjust freely once you have engagement data.
#   9:00 AM IST -> 03:30 UTC
#   7:00 PM IST -> 13:30 UTC
on:
  schedule:
    - cron: "30 3 * * *"
    - cron: "30 13 * * *"
  workflow_dispatch: {}

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r content_pipeline/requirements.txt
          pip install -r fb_auto_poster/requirements.txt

      - name: Generate and post one meme
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          PAGE_HANDLE: "@MemeVaultUSA"
        run: python3 auto_post_one.py

      - name: Commit updated dedupe log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content_pipeline/used_memes.json
          git diff --cached --quiet || git commit -m "Update used_memes log [skip ci]"
          git push
